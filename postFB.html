<!DOCTYPE html>
<html lang="zh-TW">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>鬼磕頭小說</title>
	<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
	<link rel="stylesheet" href="CSS/postFB.css">
</head>
<body>

<div class="container">
	<h1>📖 鬼磕頭小說庫</h1>
	<div class="search-group">
		<input type="text" id="search" class="search-bar" placeholder="🔍 搜尋內容..." oninput="currentPage=1; updateDisplay()">
		<button id="favToggle" class="filter-fav-btn" onclick="toggleFavFilter()">⭐ 收藏</button>
	</div>
	<select id="titleFilter" class="search-bar" style="margin-top: -5px; background-color: #fff;" onchange="currentPage=1; updateDisplay()">
		<option value="">📌 所有主題標題</option>
	</select>
	<div id="post-list"></div>
</div>

<div class="bottom-dock">
	<div class="dock-container">
		<div class="control-row">
			<select id="sortOrder" class="control-select" onchange="updateDisplay()">
				<option value="desc">最新更新 (倒序)</option>
				<option value="asc">從頭開始 (順序)</option>
			</select>
			<select id="pageSize" class="control-select" onchange="currentPage=1; updateDisplay()">
				<option value="5"          >每頁  5 筆</option>
				<option value="10"         >每頁 10 筆</option>
				<option value="20" selected>每頁 20 筆</option>
				<option value="50"         >每頁 50 筆</option>
				<option value="100"        >每頁 100 筆</option>
				<option value="all"        >顯示全部</option>
			</select>
		</div>
		<div class="pagination">
			<button onclick="changePage(-1)" id="prevBtn" class="page-btn">上一頁</button>
			<span id="pageNum" class="page-num-display">1 / 1</span>
			<button onclick="changePage(1)" id="nextBtn" class="page-btn">下一頁</button>
		</div>
	</div>
</div>

<div id="postModal" class="modal" onclick="closeModal()">
	<div class="modal-content" onclick="event.stopPropagation()">
		<div class="modal-header">
			<div id="modal-header-title" class="modal-header-title"></div>
			<span class="close-btn" onclick="closeModal()">&times;</span>
		</div>
		<div class="modal-body-scroll">
			<div id="modal-date" class="post-date"></div>
			<div id="modal-images"></div>
			<div id="modal-body" class="post-content" style="display:block; padding-top: 10px; font-size:1.15em; -webkit-line-clamp: unset;"></div>
		</div>
	</div>
</div>

<script src="Javascript/postFB.js"></script>

</body>
</html>
